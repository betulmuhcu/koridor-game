<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koridor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="startScreen" class="overlay">
        <div class="menu-box">
            <h1>KORİDOR</h1>
            <button class="menu-btn" onclick="startGame()">▶OYUNU BAŞLAT</button>
            <button class="menu-btn btn-blue-glow" onclick="showInstructions()">NASIL OYNANIR?</button>
        </div>
    </div>

    <div id="instructionScreen" class="overlay hidden">
        <div class="menu-box">
            <h2 style="margin-bottom:30px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:15px;">OYUN REHBERİ</h2>
            
            <div class="guide-grid">
                <div class="guide-card">
                    <div class="card-header"><span class="card-title">HAREKET</span></div>
                    <div class="card-text">Şerit değiştirmek için ekrana <strong>dokun</strong> veya <span style="background:#333; padding:2px 5px; border-radius:4px;">BOŞLUK</span> tuşuna bas.</div>
                </div>

                <div class="guide-card">
                    <div class="card-header"><span class="card-title">HIZ ŞERİTLERİ</span></div>
                    <div class="card-text">Üstüne geldiğinde aniden hızlanırsın!</div>
                </div>

                <div class="guide-card">
                    <div class="card-header"><span class="card-title">PORTALLAR</span></div>
                    <div class="card-text">Siyah portala girip Beyaz portaldan çık!</div>
                </div>

                <div class="guide-card">
                    <div class="card-header"><span class="card-title">TEHDİTLER</span></div>
                    <div class="card-text">Dikenlere değme, çukurlara düşme!</div>
                </div>
            </div>

            <button class="menu-btn btn-blue-glow" onclick="hideInstructions()">GERİ DÖN</button>
        </div>
    </div>

    <div id="pauseContainer" class="hidden">
        <button id="pauseBtn" onclick="togglePause()">II</button>
    </div>

    <div id="pauseMenu" class="overlay hidden">
        <div class="menu-box" style="padding: 40px; max-width: 400px;">
            <h2 style="font-size: 2.5rem; margin-bottom: 10px;">DURAKLATILDI</h2>
            <p style="color:#888; margin-bottom: 30px;">Hazır mısın?</p>
            
            <button class="menu-btn" onclick="togglePause()">DEVAM ET ▶</button>
            <button id="muteBtn" class="menu-btn btn-blue-glow" onclick="toggleMute()">SES: AÇIK 🔊</button>
            <button class="menu-btn btn-blue-glow" onclick="quitToMainMenu()">ANA MENÜYE DÖN</button>
        </div>
    </div>

    <div id="countdown-overlay" class="hidden">
        <div id="countdown-text">3</div>
    </div>

    <div id="ui-layer">
        <div id="score-container">
            <div id="score">0</div>
            <div id="high-score-box">REKOR: <span id="high-score">0</span></div>
        </div>
    </div>

    <div id="game-over">
        <h1>YANDIN!</h1>
        <p style="font-size:20px; font-weight:bold;">SKOR: <span id="final-score">0</span></p>
        <button id="retry-btn">TEKRAR DENE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
